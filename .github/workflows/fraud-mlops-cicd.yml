name: fraud-mlops-cicd

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  repository_dispatch:
    types: [monitoring_alert]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  TRAINING_IMAGE: fraud-training
  API_IMAGE: fraud-inference-api

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest ruff
      - name: Lint
        run: ruff check src tests
      - name: Unit tests
        run: pytest
      - name: Data validation checks
        run: |
          python - <<'PY'
          from pathlib import Path
          import pandas as pd
          path = Path("data/train_transaction.csv")
          if path.exists():
              df = pd.read_csv(path, nrows=1000)
              missing_ratio = float(df.isna().mean().mean())
              assert "isFraud" in df.columns, "Target column missing"
              print({"rows": len(df), "missing_ratio": missing_ratio})
          else:
              print("Dataset not present in CI; schema validation skipped.")
          PY

  build-and-package:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push training image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.training
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.TRAINING_IMAGE }}:${{ github.sha }}
      - name: Build and push inference API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-package
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Kubeflow pipeline
        run: echo "Trigger Kubeflow pipeline run through API or SDK here"
      - name: Deploy inference service
        run: echo "Apply Kubernetes manifests or update serving endpoint here"

  intelligent-retraining:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate retraining evidence
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          python -m fraud_mlops.intelligent_trigger \
            --event "${{ github.event.client_payload.event }}" \
            --metric "${{ github.event.client_payload.metric }}" \
            --value "${{ github.event.client_payload.value }}" \
            --threshold "${{ github.event.client_payload.threshold }}"
