global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager-live:9093"]

scrape_configs:
  - job_name: fraud-inference-api-local
    static_configs:
      - targets: ["host.docker.internal:8000"]
