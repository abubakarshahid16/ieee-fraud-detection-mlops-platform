          \ *\n\ndef model_training(feature_status: str) -> str:\n    return f\"{feature_status}\
          \ -> model training completed\"\n\n"
        image: python:3.11-slim
pipelineInfo:
  description: Kubeflow pipeline for fraud detection lifecycle
  name: fraud-detection-pipeline
root:
  dag:
    tasks:
      condition-1:
        componentRef:
          name: comp-condition-1
        dependentTasks:
        - model-evaluation
        inputs:
          parameters:
            pipelinechannel--deploy_auc_threshold:
              componentInputParameter: deploy_auc_threshold
            pipelinechannel--model-evaluation-Output:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: model-evaluation
        taskInfo:
          name: condition-1
        triggerPolicy:
          condition: inputs.parameter_values['pipelinechannel--model-evaluation-Output']
            >= inputs.parameter_values['pipelinechannel--deploy_auc_threshold']
      data-ingestion:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-data-ingestion
        retryPolicy:
          backoffDuration: 0s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 2
        taskInfo:
          name: data-ingestion
      data-preprocessing:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-data-preprocessing
        dependentTasks:
        - data-validation
        inputs:
          parameters:
            validation_status:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: data-validation
        retryPolicy:
          backoffDuration: 0s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 2
        taskInfo:
          name: data-preprocessing
      data-validation:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-data-validation
        dependentTasks:
        - data-ingestion
        inputs:
          parameters:
            ingestion_status:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: data-ingestion
        retryPolicy:
          backoffDuration: 0s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 2
        taskInfo:
          name: data-validation
      feature-engineering:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-feature-engineering
        dependentTasks:
        - data-preprocessing
        inputs:
          parameters:
            preprocessing_status:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: data-preprocessing
        retryPolicy:
          backoffDuration: 0s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 2
        taskInfo:
          name: feature-engineering
      model-evaluation:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-model-evaluation
        dependentTasks:
        - model-training
        inputs:
          parameters:
            training_status:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: model-training
        retryPolicy:
          backoffDuration: 0s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 1
        taskInfo:
          name: model-evaluation
      model-training:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-model-training
        dependentTasks:
        - feature-engineering
        inputs:
          parameters:
            feature_status:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: feature-engineering
        retryPolicy:
          backoffDuration: 0s
          backoffFactor: 2.0
          backoffMaxDuration: 3600s
          maxRetryCount: 1
        taskInfo:
          name: model-training
  inputDefinitions:
    parameters:
      deploy_auc_threshold:
        defaultValue: 0.92
        isOptional: true
        parameterType: NUMBER_DOUBLE
schemaVersion: 2.1.0
sdkVersion: kfp-2.8.0
